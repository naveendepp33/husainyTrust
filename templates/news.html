{% extends 'base.html' %}
{% load static %}

{% block content %}

<main class="nxl-container">
    <div class="nxl-content">
        <div class="main-content">
            <div class="row">
                  {% if messages %}
<div class="message-container">

    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show auto-close-alert" role="alert">

        {{ message }}

        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>

    </div>
    {% endfor %}

</div>
{% endif %}
             
                <div class="col-xl-12">
                    <div class="card invoice-container">
                        <div class="card-header">
                            <h5>Add News</h5>

                        </div>
                        <form method="POST">
{% csrf_token %}

<div class="card-body p-0">

<hr class="border-dashed">

<div class="px-4 row">

<div class="col-xl-6">
<div class="form-group mb-4">

<label class="form-label">News & Announcements</label>

<textarea class="form-control"
          name="content"
          rows="4"
          placeholder="News & Announcements">{{ news.content }}</textarea>

</div>
</div>

</div>

<hr class="border-dashed">

<div class="px-4 pb-4 text-end">
<button type="submit" class="btn-submit-user">
SAVE
</button>
</div>

</div>

</form>
                    </div>
                </div>


            </div>

        </div>
        <!-- [ Main Content ] end -->
    </div>
    <!-- [ Footer ] start -->
    <!-- [ Footer ] end -->
    <!-- [ Footer ] end -->
</main>

{% endblock content %}
