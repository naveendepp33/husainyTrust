{% extends 'base.html' %}
{% load static %}

{% block content %}
<main class="nxl-container">
    <div class="nxl-content">

        <div class="main-content">
            <div class="row">
                <div class="col-xl-12">
                    <div class="card invoice-container">
                        <div class="card-header">
                            <h5>Department</h5>

                            <a href="#" class="btn btn-primary" data-bs-toggle="modal"
                                data-bs-target="#addDepartmentModal">
                                <i class="feather-plus me-2"></i>
                                <span>Add Department</span>
                            </a>


                        </div>

                        <div class="col-lg-12">
                            <!-- <div class="card stretch stretch-full"> -->
                                <div class="card-body p-0">
                                    <div class="table-responsive">
                                        <table class="table table-hover" id="projectList">
                                            <thead>
                                                <tr>



                                                    <th>S.No</th>       
                                                    <th>Department</th>
                                                    <th class="text-end">Actions</th>
                                                </tr>

                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <td class="text-dark fw-bold">1</td>


                                                    <td>
                                                        <a href="javascript:void(0);" class="d-block mb-1">Education</a>

                                                    </td>


                                                    <td class="text-end">
                                                        <div class="hstack gap-2 justify-content-end">

                                                            <a href="javascript:void(0);" class="avatar-text avatar-md">
                                                                <i class="feather-edit"></i>
                                                            </a>
                                                            <a href="javascript:void(0);" class="avatar-text avatar-md">
                                                                <i class="feather-trash-2"></i>
                                                            </a>
                                                        </div>
                                                    </td>
                                                </tr>


                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Add Department Modal -->
<div class="modal fade" id="addDepartmentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add Department</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form method="POST" action="">
                {% csrf_token %}
                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" name="department_name" class="form-control" placeholder="Enter Department Name"
                            required>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock content %}
