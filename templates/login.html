{% load static %}
<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="keyword" content="">
    <meta name="author" content="theme_ocean">
    <!--! The above 6 meta tags *must* come first in the head; any other head content must come *after* these tags !-->
    <!--! BEGIN: Apps Title-->
    <title>The Husainy Trust</title>
    <!--! END:  Apps Title-->
    <!--! BEGIN: Favicon-->
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'assets/images/logo.png' %}"> <!--! END: Favicon-->
    <!--! BEGIN: Bootstrap CSS-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/bootstrap.min.css' %}">
    <!--! END: Bootstrap CSS-->
    <!--! BEGIN: Vendors CSS-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/vendors/css/vendors.min.css' %}">
    <!--! END: Vendors CSS-->
    <!--! BEGIN: Custom CSS-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/theme.min.css' %}">
    <!--! END: Custom CSS-->
    <!--! HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries !-->
    <!--! WARNING: Respond.js doesn"t work if you view the page via file: !-->
    <!--[if lt IE 9]>
			<script src="https:oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
			<script src="https:oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
		<![endif]-->
    <style>
        .message-container {
            position: fixed;
            top: 50px;
            right: 20px;
            width: 320px;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <!--! ================================================================ !-->
    <!--! [Start] Main Content !-->
    <!--! ================================================================ !-->
    <main class="auth-cover-wrapper">
        <div class="auth-cover-content-inner">
            <div class="auth-cover-content-wrapper">
                <div class="auth-img">
                    <img src="{% static 'assets/images/image.png' %}" alt="" class="img-fluid">
                </div>
            </div>
        </div>
        <div class="auth-cover-sidebar-inner">
            <div class="auth-cover-card-wrapper">
                <div class="auth-cover-card p-sm-5">
                    <div class="wd-50 mb-5">
                        <!-- <img src="{% static 'assets/images/logo.png' %}" alt="" class="img-fluid"> -->
                    </div>
                    {% if messages %}
                    <div class="message-container">

                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show auto-close-alert"
                            role="alert">

                            {{ message }}

                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>

                        </div>
                        {% endfor %}
                        
                    </div>
                    {% endif %}

                    <h2 class="fs-20 fw-bolder mb-4">Login</h2>

                        <form method="POST">
                            {% csrf_token %}



                    <div class="mb-4">
                        <input type="text" name="login_input" class="form-control" placeholder="Email or Username"
                            required>
                    </div>

                    <div class="mb-3">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <div class="custom-control custom-checkbox">
                                <input type="checkbox" name="remember_me" class="custom-control-input" id="rememberMe">
                                <label class="custom-control-label c-pointer" for="rememberMe">Remember Me</label>
                            </div>
                        </div>
                        <div>
                            <a href="#" class="fs-11 text-success">Forgot password?</a>
                        </div>
                    </div>

                    <div class="mt-5">
                        <button type="submit" class="btn btn-lg btn-success w-100">Login</button>
                    </div>

                    </form>
                    <!-- </form> -->
                    <div class="w-100 mt-5 text-center mx-auto">
                        <div class="mb-4 border-bottom position-relative"><span
                                class="small py-1 px-3 text-uppercase text-muted bg-white position-absolute translate-middle">or</span>
                        </div>
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <a href="javascript:void(0);" class="btn btn-light-brand flex-fill" data-bs-toggle="tooltip"
                                data-bs-trigger="hover" title="Login with Facebook">
                                <i class="feather-facebook"></i>
                            </a>
                            <a href="javascript:void(0);" class="btn btn-light-brand flex-fill" data-bs-toggle="tooltip"
                                data-bs-trigger="hover" title="Login with Twitter">
                                <i class="feather-twitter"></i>
                            </a>
                            <a href="javascript:void(0);" class="btn btn-light-brand flex-fill" data-bs-toggle="tooltip"
                                data-bs-trigger="hover" title="Login with Github">
                                <i class="feather-github text"></i>
                            </a>
                        </div>
                    </div>
                    <div class="mt-5 text-muted">
                        <span> Don't have an account?</span>
                        <a href="auth-register-cover.html" class="fw-bold">Create an Account</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>

        setTimeout(function () {

            const alerts = document.querySelectorAll(".auto-close-alert");

            alerts.forEach(function (alert) {
                alert.style.transition = "opacity 0.5s";
                alert.style.opacity = "0";

                setTimeout(function () {
                    alert.remove();
                }, 500);
            });

        }, 3000);

    </script>
    <!--! ================================================================ !-->
    <!--! [End] Main Content !-->
    <!--! ================================================================ !-->
    <!--! ================================================================ !-->
    <!--! BEGIN: Theme Customizer !-->
    <!--! ================================================================ !-->

    <!--! ================================================================ !-->
    <!--! [End] Theme Customizer !-->
    <!--! ================================================================ !-->
    <!--! ================================================================ !-->
    <!--! Footer Script !-->
    <!--! ================================================================ !-->
    <!--! BEGIN: Vendors JS !-->
    <script src="{% static 'assets/vendors/js/vendors.min.js' %}"></script>
    <!-- vendors.min.js {always must need to be top} -->
    <!--! END: Vendors JS !-->
    <!--! BEGIN: Apps Init  !-->
    <script src="{% static 'assets/js/common-init.min.js' %}"></script>
    <!--! END: Apps Init !-->
    <!--! BEGIN: Theme Customizer  !-->
    <script src="{% static 'assets/js/theme-customizer-init.min.js' %}"></script>
    <!--! END: Theme Customizer !-->
</body>

</html>
