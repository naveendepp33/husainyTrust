                            <h5 class="fw-bold mb-0">Add Family</h5>

                        </div>

                        <form id="addFamilyForm" method="POST" enctype="multipart/form-data" novalidate>
                            {% csrf_token %}
                            <div class="card-body p-0">

                                <hr class="border-dashed">

                                <!-- Row 1 -->
                                <div class="px-4 row">

                                    <div class="col-xl-4 mb-4">
                                        <label class="form-label">Family ID</label>
                                        <input type="text" name="family_id" value="{{ next_family_id }}"

                                    </div>

                                    <div class="col-xl-4 mb-4">
                                        <label class="form-label">Family Head Full Name <span class="text-danger">*</span></label>
                                        <input type="text" name="family_head_name" id="familyHeadName" class="form-control"
                                            placeholder="Family Head Full Name" required>
                                    </div>

                                    <div class="col-xl-4 mb-4">

                                        <input type="text" name="aadhar_no" id="aadharNo" class="form-control"

                                    </div>
                                </div>

                                <div class="px-4 row">

                                    </div>

                                     <div class="col-xl-4 mb-4">
                                        <label class="form-label">Door No <span class="text-danger">*</span></label>
                                        <input type="text" name="door_no" id="doorNo" class="form-control"
                                            placeholder="Door Number" required>
                                    </div>

                                    <div class="col-xl-4 mb-4">
                                        <label class="form-label">Apartment/Flat Name</label>
                                        <input type="text" name="apartment_name" class="form-control">
                                    </div>
                                </div>

                                <!-- Row 3 -->
                                <div class="px-4 row">
                                    <!-- <div class="col-xl-4 mb-4">
                                        <label class="form-label">Flat </label>
                                        <input type="text" name="flat_no" class="form-control">
                                    </div>

                                    <div class="col-xl-4 mb-4">
                                        <label class="form-label">Floor </label>
                                        <select name="floor_no" class="form-control">
                                            <option value="">Select Floor</option>

                                            <option>1</option>
                                            <option>2</option>
                                            <option>3</option>
                                            <option>4</option>
                                        </select>
                                    </div> -->

                                    <div class="col-xl-4 mb-4">
                                        <label class="form-label">Street/Road Name</label>
                                        <input type="text" name="street_name" class="form-control">
                                    </div>
                                    <div class="col-xl-4 mb-4">
                                        <label class="form-label">Pincode <span class="text-danger">*</span></label>
                                        <select name="pincode" id="pincodeSelect" class="form-control" required>
                                            <option value="">Select Pincode</option>

                                    <div class="col-xl-4 mb-4">

{% block extra_js %}
<script>
    document.getElementById("pincodeSelect").addEventListener("change", function () {

        let pincodeId = this.value;

        if (!pincodeId) return;

        fetch(`/get-location/?pincode_id=${pincodeId}`)
            .then(response => response.json())
            .then(data => {

                // Set Area
                let areaField = document.getElementById("areaField");
                areaField.value = data.area_name;

                // Set City
                document.getElementById("cityField").value = data.city;

                // Set State
                document.getElementById("stateField").value = data.state;

            });

    });
</script>
<style>
    .error-msg {
        color: #dc3545;
        font-size: 13px;
        margin-top: 5px;
        font-weight: 500;
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .form-control.is-invalid {
        border-color: #dc3545 !important;
        background-image: none !important;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
    }
    /* Style for file input button text */
    input[type=file]::file-selector-button {
        content: "Select Image";
    }
    input[type=file]::-webkit-file-upload-button {
        content: "Select Image";
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("addFamilyForm");
        const mobileInput = document.getElementById("mobileNo");
        const memberSelect = document.getElementById("memberCount");
        const container = document.getElementById("memberFields");

        // Restrict mobile to numbers only
        mobileInput.addEventListener("input", function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Restrict Aadhaar to numbers only and handle 12 digits
        const aadharInput = document.getElementById("aadharNo");
        aadharInput.addEventListener("input", function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').substring(0, 12);
        });

        // Form submission validation
        form.addEventListener("submit", function(event) {
            let isValid = true;
            
            // Remove existing error messages
            document.querySelectorAll(".error-msg").forEach(el => el.remove());
            document.querySelectorAll(".is-invalid").forEach(el => el.classList.remove("is-invalid"));

            // Helper to show error
            const showError = (fieldId, message, isRadio = false) => {
                const field = document.getElementById(fieldId);
                if (field) {
                    field.classList.add("is-invalid");
                    
                    // Handle custom hidden file input
                    if (field.id === "rationCard") {
                        const fileLabel = field.nextElementSibling;
                        if (fileLabel) fileLabel.style.borderColor = "#dc3545";
                    }

                    const error = document.createElement("span");
                    error.className = "error-msg";
                    error.innerText = message;
                    
                    if (isRadio) {
                        field.closest("div").appendChild(error);
                    } else {
                        field.closest(".col-xl-4").appendChild(error);
                    }
                    isValid = false;
                }
            };

            // 1. Required fields validation
            const requiredFields = [
                { id: "familyHeadName", label: "Family Head Name" },
                { id: "mobileNo", label: "Mobile No" },
                { id: "doorNo", label: "Door No" },
                { id: "pincodeSelect", label: "Pincode" },
                { id: "areaField", label: "Area" },
                { id: "cityField", label: "City" },
                { id: "stateField", label: "State" },
                { id: "memberCount", label: "Member Count" },
                // { id: "landline", label: "Landline" }
            ];

            requiredFields.forEach(field => {
                const el = document.getElementById(field.id);
                if (!el.value || el.value.trim() === "") {
                    showError(field.id, `${field.label} is required`);
                }
            });

            // 2. Radio button validation (Residential Status)
            const resStatus = document.querySelector('input[name="residential_status"]:checked');
            if (!resStatus) {
                showError("resStatusGroup", "Residential Status is required", true);
            }

            // 3. Mobile number validation (exactly 10 digits)
            const mobile = mobileInput.value;
            if (mobile && mobile.length !== 10) {
                showError("mobileNo", "Mobile number must be exactly 10 digits");
            }

            // 4. Landline validation (if provided, must be 8 digits)
            // const landline = document.querySelector('input[name="landline"]').value;
            // if (landline && landline.length !== 8) {
            //     showError("landline", "Landline must be exactly 8 digits");
            // }

            // 5. Dynamic member validation
            const memberRows = document.querySelectorAll('.member-row');
            memberRows.forEach((row, index) => {
                const nameInput = row.querySelector('input[type="text"]');
                if (nameInput && (!nameInput.value || nameInput.value.trim() === "")) {
                    nameInput.classList.add("is-invalid");
                    const error = document.createElement("span");
                    error.className = "error-msg";
                    error.innerText = `Member ${index + 1} Name is required`;
                    nameInput.closest("div").appendChild(error);
                    isValid = false;
                }

                const radios = row.querySelectorAll('input[type="radio"]');
                if (radios.length > 0) {
                    const radioChecked = row.querySelector('input[type="radio"]:checked');
                    if (!radioChecked) {
                        const error = document.createElement("span");
                        error.className = "error-msg";
                        error.innerText = `Member ${index + 1} Type is required`;
                        radios[0].closest("div").appendChild(error);
                        isValid = false;
                    }
                }
            });

            if (!isValid) {
                event.preventDefault();
                // Scroll to first error
                const firstError = document.querySelector(".is-invalid, .error-msg");
                if (firstError) {
                    firstError.scrollIntoView({ behavior: "smooth", block: "center" });
                }
            }
        });

        // Real-time validation clearing
        document.querySelectorAll(".form-control").forEach(input => {
            input.addEventListener("input", function() {
                if (this.value.trim() !== "") {
                    this.classList.remove("is-invalid");
                    const error = this.closest("div").querySelector(".error-msg");
                    if (error) error.remove();
                }
            });
        });

        // Clear error for existing radio buttons (like Residential Status)
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const error = this.closest('div').querySelector('.error-msg');
                if (error) error.remove();
            });
        });

        // --- Existing logic for Member Count ---
        memberSelect.addEventListener("change", function () {
            container.innerHTML = "";
            let count = parseInt(this.value);
            if (!count) return;
            for (let i = 1; i <= count; i++) {
                let row = document.createElement("div");
                row.className = "px-4 row mt-3 member-row";
                row.innerHTML = `
                    <div class="col-xl-4 mb-3">
                        <label class="form-label">Member ${i} Name <span class="text-danger">*</span></label>
                        <input type="text" name="member_name_${i}" class="form-control" required>
                    </div>
                    <div class="col-xl-6 mb-3">
                        <label class="form-label">Type <span class="text-danger">*</span></label><br>
                        <input type="radio" name="member_type_${i}" value="Adult" required> Adult
                        <input type="radio" name="member_type_${i}" value="Student"> Student
                        <input type="radio" name="member_type_${i}" value="Baby"> Infant
                    </div>
                    <div class="col-xl-2 mb-3 d-flex align-items-end">
                        <button type="button" class="btn btn-danger btn-sm delete-btn">
                            Delete
                        </button>
                    </div>
                `;
                container.appendChild(row);
            }
        });

        container.addEventListener("click", function (e) {
            if (e.target.classList.contains("delete-btn")) {
                e.target.closest(".member-row").remove();
            }
            
            // Clear radio errors on click
            if (e.target.type === "radio") {
                const error = e.target.closest("div").querySelector(".error-msg");
                if (error) error.remove();
            }
        });

        // Clear dynamic input errors on typing
        container.addEventListener("input", function (e) {
            if (e.target.classList.contains("form-control")) {
                if (e.target.value.trim() !== "") {
                    e.target.classList.remove("is-invalid");
                    const error = e.target.closest("div").querySelector(".error-msg");
                    if (error) error.remove();
                }
            }
        });
    });
</script>
{% endblock extra_js %}
